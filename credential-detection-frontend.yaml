---
id: credential-detection-frontend

info:
  name: Hardcoded credentials or secrets in Front-end markup.
  author: Stefan Hesselman
  severity: high
  description: |
    Detects hardcoded credentials, API keys, or authorization tokens
    embedded in HTML, JavaScript, or CSS served from web applications.
  reference:
    - https://owasp.org/Top10/2025/A07_2025-Authentication_Failures/
    - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
  classification:
    cwe-id:
      - CWE-798   # Use of Hard-coded Credentials
      - CWE-312   # Cleartext Storage of Sensitive Information
      - CWE-315   # Cleartext Storage of Sensitive Information in a Cookie
  metadata:
    max-request: 10
  tags: javascript,html,css,hardcoded,secrets,credentials,api-keys,tokens

http:
  - method: GET
    path:
      # Check base URL for the hell of it.
      - "{{BaseURL}}"
      # Endpoints commonly used by front-end frameworks.
      - "{{BaseURL}}/js/app.js"
      - "{{BaseURL}}/js/main.js"
      - "{{BaseURL}}/js/bundle.js"
      - "{{BaseURL}}/static/js/bundle.js"
      - "{{BaseURL}}/static/js/main.chunk.js"
      - "{{BaseURL}}/assets/index.js"
      - "{{BaseURL}}/dist/bundle.js"
      - "{{BaseURL}}/build/static/js/main.chunk.js"
      # Checks well-known configuration files for hardcoded credentials.
      - "{{BaseURL}}/config.js"
      - "{{BaseURL}}/env.js"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: regex
        name: aws-access-key-id
        part: body
        regex:
          - '\b(AKIA|ABIA|ACCA|ASIA)[A-Z0-9]{16}\b'

      - type: regex
        name: aws-secret-access-key
        part: body
        regex:
          - '(?i)(aws.{0,15}secret|secret.{0,15}aws)[_\-\s]*[:=]\s*["\x27`]?([A-Za-z0-9/+=]{40})["\x27`]?'

      - type: regex
        name: google-api-key
        part: body
        regex:
          - '\bAIza[0-9A-Za-z\-_]{35}\b'

      - type: regex
        name: google-oauth-client-secret
        part: body
        regex:
          - '\bGOCSPX-[A-Za-z0-9_\-]{28}\b'

      - type: regex
        name: stripe-live-secret-key
        part: body
        regex:
          - '\bsk_live_[0-9a-zA-Z]{24,}\b'

      - type: regex
        name: stripe-test-secret-key
        part: body
        regex:
          - '\bsk_test_[0-9a-zA-Z]{24,}\b'

      - type: regex
        name: stripe-restricted-key
        part: body
        regex:
          - '\brk_live_[0-9a-zA-Z]{24,}\b'

      - type: regex
        name: paypal-braintree-access-token
        part: body
        regex:
          - 'access_token\$production\$[0-9a-z]{16}\$[0-9a-f]{32}'

      - type: regex
        name: github-personal-access-token
        part: body
        regex:
          - '\bghp_[A-Za-z0-9]{36}\b'

      - type: regex
        name: github-oauth-token
        part: body
        regex:
          - '\bgho_[A-Za-z0-9]{36}\b'

      - type: regex
        name: github-user-to-server-token
        part: body
        regex:
          - '\bghu_[A-Za-z0-9]{36}\b'

      - type: regex
        name: github-server-to-server-token
        part: body
        regex:
          - '\bghs_[A-Za-z0-9]{36}\b'

      - type: regex
        name: github-fine-grained-pat
        part: body
        regex:
          - '\bgithub_pat_[A-Za-z0-9_]{82}\b'

      - type: regex
        name: gitlab-personal-access-token
        part: body
        regex:
          - '\bglpat-[A-Za-z0-9\-_]{20}\b'

      - type: regex
        name: slack-bot-token
        part: body
        regex:
          - '\bxoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}\b'

      - type: regex
        name: slack-user-token
        part: body
        regex:
          - '\bxoxp-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{32}\b'

      - type: regex
        name: slack-incoming-webhook
        part: body
        regex:
          - 'https://hooks\.slack\.com/services/T[A-Z0-9]{8,12}/B[A-Z0-9]{8,12}/[A-Za-z0-9]{24}'

      - type: regex
        name: discord-webhook
        part: body
        regex:
          - 'https://discord(?:app)?\.com/api/webhooks/[0-9]{17,19}/[A-Za-z0-9_\-]{68}'

      - type: regex
        name: discord-bot-token
        part: body
        regex:
          - '\b[MN][A-Za-z0-9]{23}\.[A-Za-z0-9_\-]{6}\.[A-Za-z0-9_\-]{27}\b'

      - type: regex
        name: twilio-account-sid
        part: body
        regex:
          - '(?i)twilio.{0,30}\bAC[a-zA-Z0-9]{32}\b'

      - type: regex
        name: twilio-auth-token
        part: body
        regex:
          - '(?i)twilio.{0,30}["\x27`][a-fA-F0-9]{32}["\x27`]'

      - type: regex
        name: sendgrid-api-key
        part: body
        regex:
          - '\bSG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}\b'

      - type: regex
        name: mailchimp-api-key
        part: body
        regex:
          - '\b[0-9a-f]{32}-us[0-9]{1,2}\b'

      - type: regex
        name: mailgun-api-key
        part: body
        regex:
          - '\bkey-[0-9a-zA-Z]{32}\b'

      # Authorization Bearer tokens and/or JWTs.
      - type: regex
        name: json-web-token
        part: body
        regex:
          - '\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b'

      - type: regex
        name: pem-private-key-block
        part: body
        regex:
          - '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY( BLOCK)?-----'

      - type: regex
        name: pkcs8-private-key-block
        part: body
        regex:
          - '-----BEGIN ENCRYPTED PRIVATE KEY-----'

      # Firebase config often contains hardcoded API keys and
      # database URLs in front-end code.
      # NOTE: these keys are not secrets in their own right!
      # Allows for fingerprinting and potential abuse.
      # Verify manually!
      - type: regex
        name: firebase-config-api-key
        part: body
        # Matches the Firebase SDK
        regex:
          - '(?i)apiKey\s*:\s*["\x27`](AIza[0-9A-Za-z\-_]{35})["\x27`]'

      - type: regex
        name: firebase-realtime-database-url
        part: body
        regex:
          - 'https://[a-z0-9\-]+(-default-rtdb)?\.firebaseio\.com'

      - type: regex
        name: generic-api-key-assignment
        part: body
        # Format: apiKey: "abc123…", api_key = 'abc…', x-api-key: "abc…"
        regex:
          - '(?i)\b(api[_\-]?key|x-api-key|apikey)\s*[:=]\s*["\x27`]([A-Za-z0-9_\-]{20,64})["\x27`]'

      - type: regex
        name: generic-secret-assignment
        part: body
        # Format: clientSecret: "…", app_secret = "…", secret_key: "…"
        regex:
          - '(?i)\b(client[_\-]?secret|app[_\-]?secret|secret[_\-]?key|consumer[_\-]?secret)\s*[:=]\s*["\x27`]([^\s"''`]{16,})["\x27`]'

      - type: regex
        name: generic-access-token-assignment
        part: body
        # Format: accessToken
        regex:
          - >-
            (?i)\b(access[_\-]?token|auth[_\-]?token|
            bearer[_\-]?token|id[_\-]?token)
            \s*[:=]\s*["\x27`]([A-Za-z0-9_\-\.]{20,})
            ["\x27`]

      - type: regex
        name: generic-password-assignment
        part: body
        # Format: "password: "abc123…", passwd = 'abc…', etc.
        regex:
          - '(?i)\b(password|passwd)\s*[:=]\s*["\x27`]([^\s"''`]{8,})["\x27`]'

      - type: regex
        name: hardcoded-basic-auth-in-url
        part: body
        # Format: https://user:pass@internal-api.example.com
        regex:
          - 'https?://[A-Za-z0-9_\-\.]+:[^@\s"''`]{6,}@[A-Za-z0-9\-\.]+'

      - type: regex
        name: hardcoded-authorization-header
        part: body
        # Format: { Authorization: "Bearer abc123…" }
        regex:
          - '(?i)["\x27`]?Authorization["\x27`]?\s*:\s*["\x27`](Bearer|Basic|Token|ApiKey)\s+[A-Za-z0-9+/=_\-]{16,}["\x27`]'

    # Try to fetch credentials or secrets, if they are found.
    extractors:
      - type: regex
        name: aws-access-key-id
        part: body
        regex:
          - '(AKIA|ABIA|ACCA|ASIA)[A-Z0-9]{16}'

      - type: regex
        name: google-api-key
        part: body
        regex:
          - 'AIza[0-9A-Za-z\-_]{35}'

      - type: regex
        name: stripe-key
        part: body
        regex:
          - '(?:r|s)k_(?:live|test)_[0-9a-zA-Z]{24,}'

      - type: regex
        name: github-token
        part: body
        regex:
          - 'gh[pousr]_[A-Za-z0-9_]{36,}'
          - 'github_pat_[A-Za-z0-9_]{82}'

      - type: regex
        name: gitlab-token
        part: body
        regex:
          - 'glpat-[A-Za-z0-9\-_]{20}'

      - type: regex
        name: json-web-token
        part: body
        regex:
          - 'eyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}'

      - type: regex
        name: sendgrid-api-key
        part: body
        regex:
          - 'SG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}'

      - type: regex
        name: slack-token
        part: body
        regex:
          - 'xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,}'

      - type: regex
        name: discord-webhook-url
        part: body
        regex:
          - 'https://discord(?:app)?\.com/api/webhooks/[0-9]{17,19}/[A-Za-z0-9_\-]{68}'
